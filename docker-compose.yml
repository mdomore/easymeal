  api:
    build: .
    ports:
      - "0.0.0.0:8010:8000"  # Changed to 8010 to avoid conflict with Supabase Kong on 8000
    volumes:
      - ./data:/app/data  # Keep for migration script access
      - ./app:/app/app
      - ./static:/app/static
    environment:
      # Connect to Supabase PostgreSQL database
      - DATABASE_URL=postgresql://postgres:${SUPABASE_POSTGRES_PASSWORD:-abbb4e639a90843bb672cd9a34a829e7}@supabase-db:5432/easymeal
      # Supabase Storage configuration
      - SUPABASE_URL=http://supabase-kong:8000
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_BUCKET=photos
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    networks:
      - default
      - supabase_default
    restart: unless-stopped

