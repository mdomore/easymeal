services:
  api:
    build: .
    ports:
      - "127.0.0.1:8010:8000"  # Accessible via localhost/nginx reverse proxy
    volumes:
      - ./data:/app/data
      - ./app:/app/app
      - ./static:/app/static
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      # Connect to Supabase PostgreSQL database
      - DATABASE_URL=postgresql://postgres:${SUPABASE_POSTGRES_PASSWORD}@supabase-db:5432/easymeal
      # Supabase Storage configuration
      - SUPABASE_URL=http://supabase-kong:8000
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-photos}
      - SECRET_KEY=${SECRET_KEY}
    networks:
      - default
      - supabase_default
    restart: unless-stopped

networks:
  supabase_default:
    external: true

